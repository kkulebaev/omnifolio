<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" role="img" aria-label="Omnifolio — personal investment tracker">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#C35B3C"/>
      <stop offset="0.55" stop-color="#A8482E"/>
      <stop offset="1" stop-color="#7E351F"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.18" cy="0.45" r="0.55">
      <stop offset="0" stop-color="#fff" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0 L0 0 0 40" fill="none" stroke="#fff" stroke-opacity="0.05" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1280" height="320" rx="28" fill="url(#bg)"/>
  <rect width="1280" height="320" rx="28" fill="url(#grid)"/>
  <rect width="1280" height="320" rx="28" fill="url(#glow)"/>

  <g transform="translate(150 160)">
    <circle r="84" fill="none" stroke="#fff" stroke-width="22"/>
    <circle r="14" fill="#fff"/>
  </g>

  <g font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, Inter, Helvetica, Arial, sans-serif">
    <text x="300" y="178" font-size="104" font-weight="800" fill="#fff" letter-spacing="-3">Omnifolio</text>
    <text x="304" y="226" font-size="26" font-weight="500" fill="#fde6dd" opacity="0.95">Personal investment tracker for stocks &amp; crypto</text>
  </g>

  <g transform="translate(1030 120)" stroke="#fff" stroke-opacity="0.55" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="0,80 30,60 60,68 90,30 120,42 150,0 180,15"/>
    <circle cx="180" cy="15" r="6" fill="#fff" stroke="none"/>
  </g>
</svg>
