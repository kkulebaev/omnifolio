services:
  postgres:
    image: postgres:16-alpine
    container_name: omnifolio-postgres
    environment:
      POSTGRES_DB: omnifolio
      POSTGRES_USER: omnifolio
      POSTGRES_PASSWORD: omnifolio
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U omnifolio"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile.dev
    container_name: omnifolio-api
    working_dir: /workspace/apps/api
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      ENV: dev
      DATABASE_URL: postgres://omnifolio:omnifolio@postgres:5432/omnifolio?sslmode=disable
      MASTER_KEY: AeDDfaoPcK181EBXGp3ciFOmuXtcj7ts0LnHP3OphgM
      LOG_LEVEL: debug
      BOOTSTRAP_USER_EMAIL: dev@local.test
      BOOTSTRAP_USER_PASSWORD: devpassword12345
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./apps/api:/workspace/apps/api
      - ./api:/workspace/api:ro
      - go_modules:/go/pkg/mod
      - go_build:/root/.cache/go-build

volumes:
  postgres_data:
  go_modules:
  go_build:
