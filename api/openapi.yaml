openapi: 3.0.3
info:
  title: Omnifolio API
  version: 0.1.0
  description: Personal investments tracker.
servers:
  - url: /api
    description: Local dev (proxied via Vite or Caddy)

tags:
  - name: system
  - name: auth
  - name: accounts
  - name: positions
  - name: instruments
  - name: portfolio
  - name: deposits

paths:
  /healthz:
    get:
      tags: [system]
      summary: Liveness probe
      operationId: getHealthz
      security: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Health"

  /auth/login:
    post:
      tags: [auth]
      summary: Login with email and password
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Logged in; sets session cookie
          headers:
            Set-Cookie:
              schema:
                type: string
                example: sid=...; HttpOnly; SameSite=Lax; Path=/
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationError"

  /auth/logout:
    post:
      tags: [auth]
      summary: Logout current session
      operationId: logout
      responses:
        "204":
          description: Logged out

  /auth/me:
    get:
      tags: [auth]
      summary: Get current user
      operationId: getMe
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /accounts:
    get:
      tags: [accounts]
      summary: List user accounts
      operationId: listAccounts
      responses:
        "200":
          description: List of accounts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountList"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [accounts]
      summary: Create account
      operationId: createAccount
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAccountRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationError"

  /accounts/tinvest/preview:
    post:
      tags: [accounts]
      summary: Preview T-Invest sub-accounts for a token
      operationId: previewTInvestAccounts
      description: |
        Validates a T-Invest token and returns the list of available sub-accounts
        (брокерский / ИИС / премиум). Used by the UI before account creation so
        the user can pick which sub-account to mirror.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TInvestPreviewRequest"
      responses:
        "200":
          description: Sub-accounts list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TInvestPreviewResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationError"

  /accounts/{accountId}/sync:
    parameters:
      - $ref: "#/components/parameters/AccountId"
    post:
      tags: [accounts]
      summary: Trigger an immediate sync for a brokerage account
      operationId: syncAccount
      description: |
        Synchronously fetches positions and prices for a tinvest/bybit account.
        Manual accounts return 422.
      responses:
        "200":
          description: Synced
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"

  /accounts/{accountId}:
    parameters:
      - $ref: "#/components/parameters/AccountId"
    get:
      tags: [accounts]
      summary: Get account with positions
      operationId: getAccount
      responses:
        "200":
          description: Account detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [accounts]
      summary: Update account (rename)
      operationId: updateAccount
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAccountRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"
    delete:
      tags: [accounts]
      summary: Delete account
      operationId: deleteAccount
      responses:
        "204":
          description: Deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /accounts/{accountId}/positions:
    parameters:
      - $ref: "#/components/parameters/AccountId"
    post:
      tags: [positions]
      summary: Add position to account
      operationId: createPosition
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePositionRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Position"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationError"

  /accounts/{accountId}/positions/{instrumentId}:
    parameters:
      - $ref: "#/components/parameters/AccountId"
      - $ref: "#/components/parameters/InstrumentId"
    put:
      tags: [positions]
      summary: Update position quantity
      operationId: updatePosition
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePositionRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Position"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"
    delete:
      tags: [positions]
      summary: Delete position
      operationId: deletePosition
      responses:
        "204":
          description: Deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /instruments/search:
    get:
      tags: [instruments]
      summary: Search instruments by ticker or name
      operationId: searchInstruments
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 50
      responses:
        "200":
          description: Matching instruments
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InstrumentList"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /instruments:
    get:
      tags: [instruments]
      summary: List instruments with optional search and pagination
      operationId: listInstruments
      parameters:
        - name: q
          in: query
          required: false
          description: Filter by ticker or name (case-insensitive substring).
          schema:
            type: string
            minLength: 1
            maxLength: 50
        - name: assetClass
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/AssetClass"
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        "200":
          description: Paginated list of instruments
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InstrumentList"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /portfolio:
    get:
      tags: [portfolio]
      summary: Aggregated portfolio across all accounts
      operationId: getPortfolio
      parameters:
        - name: currency
          in: query
          required: false
          description: Display currency. Defaults to user's preference.
          schema:
            type: string
            pattern: "^[A-Z]{3,5}$"
      responses:
        "200":
          description: Portfolio aggregation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Portfolio"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /deposits:
    get:
      tags: [deposits]
      summary: List user deposits
      operationId: listDeposits
      responses:
        "200":
          description: List of deposits ordered by month DESC, createdAt DESC
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DepositList"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [deposits]
      summary: Create a deposit
      operationId: createDeposit
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDepositRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Deposit"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationError"

  /deposits/{depositId}:
    parameters:
      - $ref: "#/components/parameters/DepositId"
    delete:
      tags: [deposits]
      summary: Delete a deposit
      operationId: deleteDeposit
      responses:
        "204":
          description: Deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

components:
  parameters:
    AccountId:
      name: accountId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    InstrumentId:
      name: instrumentId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    DepositId:
      name: depositId
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    Unauthorized:
      description: Not authenticated
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    NotFound:
      description: Resource not found
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    Conflict:
      description: Resource conflict (e.g., duplicate)
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    ValidationError:
      description: Validation failed
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"

  schemas:
    Health:
      type: object
      required: [status]
      properties:
        status:
          type: string
          example: ok

    Problem:
      type: object
      description: RFC 7807 Problem Details
      required: [title, status]
      properties:
        type:
          type: string
          example: /errors/validation
        title:
          type: string
          example: Validation failed
        status:
          type: integer
          example: 422
        detail:
          type: string
        instance:
          type: string
        fields:
          type: object
          additionalProperties:
            type: string

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          maxLength: 254
        password:
          type: string
          minLength: 12
          maxLength: 128
        rememberMe:
          type: boolean
          default: false

    User:
      type: object
      required: [id, email, displayCurrency, createdAt]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        displayCurrency:
          type: string
          pattern: "^[A-Z]{3,5}$"
        createdAt:
          type: string
          format: date-time

    AccountType:
      type: string
      enum: [manual, tinvest, bybit, binance]

    AccountSyncStatus:
      type: string
      enum: [success, failed, pending]

    Account:
      type: object
      required: [id, name, type, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        type:
          $ref: "#/components/schemas/AccountType"
        lastSyncedAt:
          type: string
          format: date-time
          nullable: true
        lastSyncStatus:
          allOf:
            - $ref: "#/components/schemas/AccountSyncStatus"
          nullable: true
        lastSyncError:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    AccountDetail:
      allOf:
        - $ref: "#/components/schemas/Account"
        - type: object
          required: [positions]
          properties:
            positions:
              type: array
              items:
                $ref: "#/components/schemas/Position"

    AccountList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Account"

    CreateAccountRequest:
      type: object
      required: [name, type]
      description: |
        For type=manual only `name` and `type` are required.
        For type=tinvest also `token` and `tinvestAccountId` must be provided.
        For type=bybit or type=binance also `apiKey` and `apiSecret` must be provided.
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        type:
          $ref: "#/components/schemas/AccountType"
        token:
          type: string
          minLength: 10
          maxLength: 200
          description: T-Invest read-only API token (required when type=tinvest)
        tinvestAccountId:
          type: string
          minLength: 1
          maxLength: 64
          description: T-Invest sub-account id (required when type=tinvest)
        apiKey:
          type: string
          minLength: 8
          maxLength: 128
          description: Read-only API key (required when type=bybit or type=binance)
        apiSecret:
          type: string
          minLength: 8
          maxLength: 128
          description: Read-only API secret (required when type=bybit or type=binance)

    TInvestPreviewRequest:
      type: object
      required: [token]
      properties:
        token:
          type: string
          minLength: 10
          maxLength: 200

    TInvestSubAccount:
      type: object
      required: [id, name, type]
      properties:
        id: { type: string }
        name: { type: string }
        type:
          type: string
          enum: [BROKER, IIS, PREMIUM]

    TInvestPreviewResponse:
      type: object
      required: [subAccounts]
      properties:
        subAccounts:
          type: array
          items:
            $ref: "#/components/schemas/TInvestSubAccount"

    UpdateAccountRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100

    AssetClass:
      type: string
      enum: [ru_stock, ru_bond, ru_etf, us_stock, us_etf, crypto, cash]

    Instrument:
      type: object
      required: [id, ticker, assetClass, currency, name, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        ticker:
          type: string
        assetClass:
          $ref: "#/components/schemas/AssetClass"
        currency:
          type: string
          pattern: "^[A-Z]{3,5}$"
        name:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        currentPrice:
          type: string
          description: Last known price as decimal string. Omitted if no price recorded yet.
          example: "123.45"
        priceUpdatedAt:
          type: string
          format: date-time
          description: When currentPrice was last fetched. Omitted if no price recorded yet.

    InstrumentList:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Instrument"
        total:
          type: integer
          minimum: 0
          description: Total instruments matching the filter (for pagination).

    Position:
      type: object
      required: [accountId, instrument, quantity, updatedAt]
      properties:
        accountId:
          type: string
          format: uuid
        instrument:
          $ref: "#/components/schemas/Instrument"
        quantity:
          type: string
          description: Decimal as string (NUMERIC 38,18)
          example: "10.5"
        updatedAt:
          type: string
          format: date-time

    CreatePositionRequest:
      type: object
      required: [instrumentId, quantity]
      properties:
        instrumentId:
          type: string
          format: uuid
        quantity:
          type: string
          description: Decimal > 0 as string
          example: "10"

    UpdatePositionRequest:
      type: object
      required: [quantity]
      properties:
        quantity:
          type: string
          description: Decimal > 0 as string

    PortfolioPosition:
      type: object
      required:
        [
          accountId,
          accountName,
          instrumentId,
          ticker,
          assetClass,
          currency,
          quantity,
          valueDisplay,
          priceStale,
        ]
      properties:
        accountId:
          type: string
          format: uuid
        accountName:
          type: string
        instrumentId:
          type: string
          format: uuid
        ticker:
          type: string
        assetClass:
          $ref: "#/components/schemas/AssetClass"
        currency:
          type: string
        quantity:
          type: string
        price:
          type: string
          nullable: true
        valueNative:
          type: string
          nullable: true
        valueDisplay:
          type: string
          nullable: true
        priceFetchedAt:
          type: string
          format: date-time
          nullable: true
        priceStale:
          type: boolean

    PortfolioSummary:
      type: object
      required:
        [
          displayCurrency,
          grandTotal,
          byAssetClass,
          byCurrency,
          byAccount,
        ]
      properties:
        displayCurrency:
          type: string
        grandTotal:
          type: string
          description: Total in display currency
        byAssetClass:
          type: object
          additionalProperties:
            type: string
        byCurrency:
          type: object
          additionalProperties:
            type: string
        byAccount:
          type: object
          additionalProperties:
            type: string

    Portfolio:
      type: object
      required: [summary, positions]
      properties:
        summary:
          $ref: "#/components/schemas/PortfolioSummary"
        positions:
          type: array
          items:
            $ref: "#/components/schemas/PortfolioPosition"

    Deposit:
      type: object
      required: [id, month, amount, createdAt]
      properties:
        id:
          type: string
          format: uuid
        month:
          type: string
          format: date
          description: Always the first day of the month, e.g. 2026-05-01
        amount:
          type: string
          description: Whole rubles, no decimals
        createdAt:
          type: string
          format: date-time

    DepositList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Deposit"

    CreateDepositRequest:
      type: object
      required: [month, amount]
      properties:
        month:
          type: string
          format: date
          description: Any date; the day is normalized to the first of the month server-side
        amount:
          type: string
          pattern: "^[1-9][0-9]*$"
          description: Whole positive rubles

  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: sid

security:
  - sessionCookie: []
